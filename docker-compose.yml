version: "3.9"

services:
  api:
    build: .
    container_name: med_reconcile_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7
    container_name: med_reconcile_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: